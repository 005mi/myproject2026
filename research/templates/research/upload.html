{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เพิ่มผลงานวิชาการ | RTEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; padding: 20px; }
        .form-container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .logo-img { max-height: 80px; display: block; margin: 0 auto 15px; }
        h2 { color: #800000; text-align: center; margin-top: 0; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        
        /* สไตล์สำหรับปุ่มบันทึก */
        .btn-submit { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 1.1em; font-weight: bold; transition: 0.3s; }
        .btn-submit:hover { background: #218838; }
        
        .btn-back { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
        
        /* สไตล์สำหรับกล่องแจ้งเตือน */
        .alert-messages {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 10px;
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <img src="{% static 'logoretc.png' %}" alt="Logo" class="logo-img">
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert-messages">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <h2>ส่งผลงานวิจัยใหม่</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>ชื่อโครงการ (ภาษาไทย)</label>
                <input type="text" name="title_th" required>
            </div>
            <div class="form-group">
                <label>สาขาวิชา</label>
                <select name="department">
                    <option value="EE">สาขาเทคโนโลยีไฟฟ้า</option>
                    <option value="ET">สาขาเทคโนโลยีอิเล็กทรอนิกส์</option>
                    <option value="PT">สาขาเทคโนโลยีการผลิต</option>
                    <option value="MT">สาขาเทคโนโลยีเครื่องกล</option>
                    <option value="CT" selected>สาขาเทคโนโลยีคอมพิวเตอร์</option>
                </select>
            </div>
            <div class="form-group">
                <label>ชื่อผู้จัดทำ</label>
                <input type="text" name="student_name" placeholder="เช่น นายสมชาย ใจดี, นายสมพงษ์ เรียนดี" required>
            </div>
            <div class="form-group">
                <label>ปีการศึกษา (พ.ศ.)</label>
                <input type="number" name="academic_year" value="2569" required>
            </div>
            <div class="form-group">
                <label>ไฟล์ PDF ผลงาน (รับเฉพาะ .pdf เท่านั้น)</label>
                <input type="file" name="pdf_file" accept=".pdf,application/pdf" required>
            </div>
            <button type="submit" class="btn-submit">บันทึกข้อมูลและส่งตรวจสอบ</button>
            <a href="{% url 'project_list' %}" class="btn-back">กลับหน้าหลัก</a>
        </form>
    </div>
</body>
</html>
