{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | RETC Academic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --crimson: #7a0c22;
            --gold: #c9972b;
            --border: rgba(122,12,34,0.12);
        }
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #fdf8f2;
            display: flex; justify-content: center; align-items: center;
            min-height: 100vh; margin: 0;
        }
        .login-container {
            background: white; padding: 40px; border-radius: 24px;
            box-shadow: 0 15px 35px rgba(122,12,34,0.1);
            width: 100%; max-width: 400px; text-align: center;
            border: 1px solid var(--border);
        }
        .logo-img { max-height: 80px; margin-bottom: 15px; }
        
        .user-type-selector {
            display: flex; gap: 8px; margin-bottom: 25px;
            background: #f5f0eb; padding: 5px; border-radius: 12px;
        }
        .type-btn {
            flex: 1; padding: 10px 5px; border-radius: 8px;
            cursor: pointer; font-size: 0.8em; font-weight: 700;
            transition: 0.3s; border: none; color: #7a6e6a; background: transparent;
        }
        .type-btn.active { background: var(--crimson); color: white; }

        .form-group { text-align: left; margin-bottom: 18px; position: relative; } /* เพิ่ม relative เพื่อจัดตำแหน่งลูก */
        label { display: block; margin-bottom: 8px; font-weight: bold; color: var(--crimson); font-size: 0.9em; }
        
        input {
            width: 100%; padding: 12px 15px; border: 1.5px solid var(--border);
            border-radius: 10px; box-sizing: border-box; font-size: 1rem; transition: 0.3s;
        }
        input:focus { border-color: var(--crimson); outline: none; box-shadow: 0 0 8px rgba(122, 12, 34, 0.1); }
        
        /* ปรับแต่งช่องรหัสผ่านเป็นพิเศษ */
        .password-input { padding-right: 45px; }
        
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 40px; /* ปรับให้ตรงกับกลางช่อง input หลังจากมี label */
            cursor: pointer;
            color: #aaa;
            transition: 0.3s;
            z-index: 10;
        }
        .toggle-password:hover { color: var(--crimson); }

        .btn-login {
            width: 100%; padding: 14px; background-color: var(--crimson);
            color: white; border: none; border-radius: 10px;
            font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 10px;
        }
        .btn-login:hover { background-color: #4e0715; transform: translateY(-2px); }

        .footer-links { margin-top: 25px; font-size: 0.9rem; line-height: 1.6; }
        .footer-links a { color: var(--gold); text-decoration: none; font-weight: bold; }
        .error-msg { background-color: #f8d7da; color: #721c24; padding: 10px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85em; }
    </style>
</head>
<body>

<div class="login-container">
    <img src="{% static 'logoretc.png' %}" alt="Logo" class="logo-img">
    <h2 style="color: var(--crimson); margin-bottom: 5px;">RETC Academic</h2>
    <p style="color: #7a6e6a; font-size: 0.85em; margin-bottom: 25px;">กรุณาเลือกประเภทผู้ใช้งานก่อนเข้าสู่ระบบ</p>

    {% if error %}
        <div class="error-msg"><i class="fas fa-exclamation-circle"></i> ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        
        <div class="user-type-selector">
            <button type="button" class="type-btn active" onclick="setType('student', 'รหัสนักศึกษา', this)">นักศึกษา</button>
            <button type="button" class="type-btn" onclick="setType('guest', 'ชื่อผู้ใช้งาน', this)">บุคคลภายนอก</button>
            <button type="button" class="type-btn" onclick="setType('admin', 'ชื่อผู้ใช้งาน', this)">เจ้าหน้าที่</button>
        </div>
        <input type="hidden" name="user_role" id="user_role" value="student">

        <div class="form-group">
            <label id="username-label">รหัสนักศึกษา</label>
            <input type="text" name="username" id="username_input" placeholder="ตัวอย่าง 68401280555" required>
        </div>

        <div class="form-group">
            <label>รหัสผ่าน (Password)</label>
            <input type="password" name="password" id="password_input" class="password-input" placeholder="กรอกรหัสผ่าน" required>
            <i class="fas fa-eye toggle-password" id="toggleIcon" onclick="togglePassword()"></i>
        </div>

        <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>

    <div class="footer-links">
        ยังไม่มีบัญชี <a href="{% url 'register' %}">ลงทะเบียนใหม่</a> | 
        <a href="{% url 'password_reset_quick' %}">ลืมรหัสผ่าน</a>
        <br>
        <a href="{% url 'project_list' %}" style="font-size: 0.85em; color: #800000; font-weight: normal; display: block; margin-top: 10px;">กลับหน้าหลัก</a>
    </div>
</div>

<script>
    function setType(role, labelText, btn) {
        document.getElementById('user_role').value = role;
        document.getElementById('username-label').innerText = labelText;
        
        const userInput = document.getElementById('username_input');
        if(role === 'student') {
            userInput.placeholder = "ตัวอย่าง 68401280555";
        } else {
            userInput.placeholder = "กรอกชื่อผู้ใช้";
        }

        const buttons = document.querySelectorAll('.type-btn');
        buttons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    // ฟังก์ชันสำหรับสลับการมองเห็นรหัสผ่าน
    function togglePassword() {
        const passwordInput = document.getElementById('password_input');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>

</body>
</html>
