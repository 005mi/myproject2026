{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ | RTEC Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Sarabun', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .login-container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-img {
            max-height: 90px;
            margin-bottom: 20px;
        }
        h2 {
            color: #800000;
            margin-bottom: 25px;
            font-size: 1.5rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #555;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
            transition: 0.3s;
        }
        input:focus {
            border-color: #800000;
            outline: none;
            box-shadow: 0 0 8px rgba(128, 0, 0, 0.1);
        }
        .btn-login {
            width: 100%;
            padding: 12px;
            background-color: #800000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn-login:hover {
            background-color: #a00000;
            transform: translateY(-2px);
        }
        .footer-links {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #777;
        }
        .footer-links a {
            color: #2d50d6;
            text-decoration: none;
            font-weight: bold;
        }
        .error-msg {
            background-color: #f8d7da;
            color: #721c24;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

<div class="login-container">
    <img src="{% static 'logoretc.png' %}" alt="Logo" class="logo-img">
    <h2>เข้าสู่ระบบใช้งาน</h2>

    {% if error %}
        <div class="error-msg">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
        <div class="form-group">
            <label>ชื่อผู้ใช้งาน (Username)</label>
            <input type="text" name="username" placeholder="กรอกชื่อผู้ใช้งาน" required>
        </div>
        <div class="form-group">
            <label>รหัสผ่าน (Password)</label>
            <input type="password" name="password" placeholder="กรอกรหัสผ่าน" required>
        </div>
        <button type="submit" class="btn-login">เข้าสู่ระบบ</button>
    </form>

    <div class="footer-links">
        ยังไม่มีบัญชี<a href="{% url 'register' %}">ลงทะเบียนใหม่</a>
        <br><br>
        <a href="{% url 'project_list' %}" style="color: #666; font-weight: normal;">กลับหน้าหลัก</a>
    </div>
</div>

</body>
</html>
