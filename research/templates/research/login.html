{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>เข้าสู่ระบบ | RETC Academic Portal</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --crimson:    #7a0c22;
            --crimson-dk: #4e0715;
            --crimson-lt: #a01030;
            --gold:       #c9972b;
            --gold-lt:    #f0c060;
            --cream:      #fdf8f2;
            --ink:        #1a1210;
            --muted:      #7a6e6a;
            --border:     rgba(122,12,34,0.12);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        html { height: 100%; }

        body {
            font-family: 'Sarabun', sans-serif;
            background: var(--cream);
            min-height: 100vh;
            min-height: 100dvh; /* dynamic viewport for mobile */
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
        }

        /* Background deco */
        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 0;
            background:
                radial-gradient(ellipse 70% 50% at 10% 0%, rgba(122,12,34,0.08) 0%, transparent 60%),
                radial-gradient(ellipse 50% 40% at 90% 100%, rgba(201,151,43,0.07) 0%, transparent 60%);
            pointer-events: none;
        }

        /* ── CARD ── */
        .login-card {
            position: relative; z-index: 1;
            background: white;
            border: 1px solid var(--border);
            border-radius: 28px;
            box-shadow: 0 20px 60px rgba(122,12,34,0.10), 0 4px 16px rgba(0,0,0,0.04);
            width: 100%;
            max-width: 420px;
            padding: clamp(24px, 6vw, 44px);
            animation: fadeUp .5s ease both;
        }

        /* ── HEADER ── */
        .card-header {
            text-align: center;
            margin-bottom: clamp(20px, 4vw, 32px);
        }
        .logo-img {
            height: clamp(52px, 12vw, 72px);
            margin-bottom: 12px;
            filter: drop-shadow(0 3px 8px rgba(122,12,34,0.15));
        }
        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.3em, 4vw, 1.6em);
            font-weight: 900;
            color: var(--crimson-dk);
            margin-bottom: 4px;
        }
        .card-title span {
            background: linear-gradient(135deg, var(--gold), var(--gold-lt));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .card-sub {
            color: var(--muted);
            font-size: clamp(0.78em, 2.5vw, 0.85em);
        }

        /* ── ERROR ── */
        .error-msg {
            background: #fdf0f0;
            border: 1px solid rgba(192,57,43,0.25);
            border-left: 4px solid #c0392b;
            color: #7b1a1a;
            padding: 12px 16px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 0.85em;
            display: flex; align-items: center; gap: 8px;
        }

        /* ── TYPE SELECTOR ── */
        .user-type-selector {
            display: flex;
            gap: 6px;
            background: #f5f0eb;
            padding: 5px;
            border-radius: 14px;
            margin-bottom: clamp(18px, 4vw, 26px);
        }
        .type-btn {
            flex: 1;
            padding: clamp(8px, 2vw, 11px) 4px;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Sarabun', sans-serif;
            font-size: clamp(0.72em, 2.2vw, 0.82em);
            font-weight: 700;
            transition: all .25s;
            border: none;
            color: var(--muted);
            background: transparent;
            white-space: nowrap;
            touch-action: manipulation; /* better tap response */
        }
        .type-btn.active {
            background: var(--crimson);
            color: white;
            box-shadow: 0 3px 10px rgba(122,12,34,0.28);
        }
        .type-btn:not(.active):hover {
            background: rgba(122,12,34,0.07);
            color: var(--crimson);
        }

        /* ── FORM FIELDS ── */
        .form-group {
            text-align: left;
            margin-bottom: clamp(14px, 3vw, 20px);
            position: relative;
        }
        label {
            display: block;
            margin-bottom: 7px;
            font-weight: 700;
            color: var(--crimson);
            font-size: clamp(0.8em, 2.5vw, 0.88em);
        }
        input[type="text"],
        input[type="password"] {
            width: 100%;
            padding: clamp(11px, 3vw, 14px) 16px;
            border: 1.5px solid var(--border);
            border-radius: 12px;
            font-family: 'Sarabun', sans-serif;
            font-size: clamp(0.9em, 3vw, 1em);
            color: var(--ink);
            transition: border-color .2s, box-shadow .2s;
            background: #faf7f4;
            /* prevent iOS zoom on focus (font-size >= 16px trick) */
            font-size: max(16px, 1em);
        }
        input[type="text"]:focus,
        input[type="password"]:focus {
            border-color: var(--crimson);
            outline: none;
            box-shadow: 0 0 0 3px rgba(122,12,34,0.08);
            background: white;
        }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 46px; }
        .toggle-password {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #bbb;
            transition: color .2s;
            font-size: 0.95em;
            /* larger tap target on mobile */
            padding: 6px;
            margin: -6px;
        }
        .toggle-password:hover { color: var(--crimson); }

        /* ── SUBMIT ── */
        .btn-login {
            width: 100%;
            padding: clamp(13px, 3.5vw, 16px);
            background: linear-gradient(135deg, var(--crimson) 0%, var(--crimson-lt) 100%);
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Sarabun', sans-serif;
            font-size: clamp(0.95em, 3vw, 1.05em);
            font-weight: 700;
            cursor: pointer;
            transition: box-shadow .2s, transform .2s;
            box-shadow: 0 4px 16px rgba(122,12,34,0.28);
            margin-top: 8px;
            touch-action: manipulation;
        }
        .btn-login:hover {
            box-shadow: 0 8px 24px rgba(122,12,34,0.38);
            transform: translateY(-2px);
        }
        .btn-login:active { transform: translateY(0); }

        /* ── FOOTER LINKS ── */
        .footer-links {
            margin-top: clamp(18px, 4vw, 26px);
            font-size: clamp(0.8em, 2.5vw, 0.9em);
            line-height: 1.8;
            text-align: center;
            color: var(--muted);
        }
        .footer-links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 700;
        }
        .footer-links a:hover { color: var(--crimson); }
        .back-link {
            display: inline-block;
            margin-top: 10px;
            font-size: 0.88em;
            color: var(--crimson) !important;
            font-weight: 400 !important;
            opacity: 0.7;
        }
        .back-link:hover { opacity: 1; }

        /* ── ANIMATION ── */
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(28px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ── LANDSCAPE MOBILE ── */
        @media (max-height: 600px) and (orientation: landscape) {
            body { align-items: flex-start; padding: 12px 16px; }
            .login-card { padding: 20px 28px; border-radius: 20px; }
            .logo-img { height: 40px; margin-bottom: 6px; }
            .card-header { margin-bottom: 14px; }
            .form-group { margin-bottom: 12px; }
        }

        /* ── SMALL PHONES (< 360px) ── */
        @media (max-width: 359px) {
            .login-card { padding: 20px 18px; border-radius: 20px; }
            .type-btn { font-size: 0.68em; padding: 8px 2px; }
        }

        /* ── TABLET & UP ── */
        @media (min-width: 640px) {
            .login-card { padding: 44px 48px; }
        }
    </style>
</head>
<body>

<div class="login-card">

    <div class="card-header">
        <img src="{% static 'logoretc.png' %}" alt="Logo RETC" class="logo-img">
        <div class="card-title">RETC <span>Academic</span></div>
        <p class="card-sub">กรุณาเลือกประเภทผู้ใช้งานก่อนเข้าสู่ระบบ</p>
    </div>

    {% if error %}
    <div class="error-msg">
        <i class="fas fa-exclamation-circle"></i>
        ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
    </div>
    {% endif %}

    <form method="POST" autocomplete="on">
        {% csrf_token %}

        <div class="user-type-selector">
            <button type="button" class="type-btn active"
                onclick="setType('student', 'รหัสนักศึกษา', 'ตัวอย่าง 68401280555', this)">
                <i class="fas fa-user-graduate" style="margin-right:4px;"></i>นักศึกษา
            </button>
            <button type="button" class="type-btn"
                onclick="setType('guest', 'ชื่อผู้ใช้งาน', 'กรอกชื่อผู้ใช้', this)">
                <i class="fas fa-user" style="margin-right:4px;"></i>บุคคลภายนอก
            </button>
            <button type="button" class="type-btn"
                onclick="setType('admin', 'ชื่อผู้ใช้งาน', 'กรอกชื่อผู้ใช้', this)">
                <i class="fas fa-shield-halved" style="margin-right:4px;"></i>เจ้าหน้าที่
            </button>
        </div>
        <input type="hidden" name="user_role" id="user_role" value="student">

        <div class="form-group">
            <label id="username-label">รหัสนักศึกษา</label>
            <input type="text" name="username" id="username_input"
                   placeholder="ตัวอย่าง 68401280555"
                   autocomplete="username" required>
        </div>

        <div class="form-group">
            <label>รหัสผ่าน</label>
            <div class="password-wrap">
                <input type="password" name="password" id="password_input"
                       placeholder="กรอกรหัสผ่าน"
                       autocomplete="current-password" required>
                <i class="fas fa-eye toggle-password" id="toggleIcon"
                   onclick="togglePassword()" title="แสดง/ซ่อนรหัสผ่าน"></i>
            </div>
        </div>

        <button type="submit" class="btn-login">
            <i class="fas fa-sign-in-alt" style="margin-right:8px;"></i>เข้าสู่ระบบ
        </button>
    </form>

    <div class="footer-links">
        ยังไม่มีบัญชี? <a href="{% url 'register' %}">ลงทะเบียนใหม่</a>
        &nbsp;|&nbsp;
        <a href="{% url 'password_reset_quick' %}">ลืมรหัสผ่าน</a>
        <br>
        <a href="{% url 'project_list' %}" class="back-link">
            <i class="fas fa-arrow-left" style="margin-right:4px;"></i>กลับหน้าหลัก
        </a>
    </div>

</div>

<script>
    function setType(role, labelText, placeholderText, btn) {
        document.getElementById('user_role').value = role;
        document.getElementById('username-label').innerText = labelText;
        document.getElementById('username_input').placeholder = placeholderText;

        document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
    }

    function togglePassword() {
        const input = document.getElementById('password_input');
        const icon  = document.getElementById('toggleIcon');
        const show  = input.type === 'password';
        input.type  = show ? 'text' : 'password';
        icon.classList.toggle('fa-eye',       !show);
        icon.classList.toggle('fa-eye-slash',  show);
    }
</script>

</body>
</html>
