{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แก้ไขข้อมูล - RTEC</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; padding: 40 daring; }
        .form-card { 
            max-width: 600px; margin: auto; background: white; 
            padding: 30px; border-radius: 15px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { color: #800000; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; 
        }
        .btn-save { 
            width: 100%; padding: 15px; background: #2e7d32; 
            color: white; border: none; border-radius: 8px; 
            font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 10px;
        }
        .btn-cancel { 
            display: block; text-align: center; margin-top: 15px; 
            color: #666; text-decoration: none; 
        }
    </style>
</head>
<body>
    <div class="form-card">
        <h2>แก้ไขข้อมูลโครงงาน</h2>
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group">
                <label>ชื่อโครงงาน (ไทย)</label>
                <input type="text" name="title_th" value="{{ project.title_th }}" required>
            </div>
            <div class="form-group">
                <label>ชื่อผู้จัดทำ</label>
                <input type="text" name="student_name" value="{{ project.student_name }}" required>
            </div>
            <div class="form-group">
                <label>ปีการศึกษา</label>
                <input type="number" name="academic_year" value="{{ project.academic_year }}" required>
            </div>
            <div class="form-group">
                <label>สาขาวิชา</label>
                <select name="department">
                    {% for code, name in project.DEPARTMENTS %}
                        <option value="{{ code }}" {% if project.department == code %}selected{% endif %}>{{ name }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label>ไฟล์ PDF (ปล่อยว่างไว้ถ้าไม่ต้องการเปลี่ยนไฟล์)</label>
                <input type="file" name="pdf_file" accept=".pdf">
                <small style="color: blue;">ไฟล์ปัจจุบัน: {{ project.pdf_file.name }}</small>
            </div>
            <button type="submit" class="btn-save">บันทึกการเปลี่ยนแปลง</button>
            <a href="{% url 'admin_dashboard' %}" class="btn-cancel">ยกเลิกและกลับหน้าจัดการ</a>
        </form>
    </div>
</body>
</html>
