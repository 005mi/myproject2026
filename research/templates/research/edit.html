{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>แก้ไขข้อมูล - RTEC</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f7f6; padding: 40px 20px; }
        .form-card { 
            max-width: 900px; margin: auto; background: white; 
            padding: 40px; border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); 
        }
        h2 { color: #800000; text-align: center; margin-bottom: 30px; }
        .section-header { 
            background: #f8f9fa; padding: 10px 15px; border-left: 5px solid #800000;
            margin: 25px 0 15px 0; font-weight: bold; color: #555;
        }
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .full-width { grid-column: span 2; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea { 
            width: 100%; padding: 12px; border: 1px solid #ddd; 
            border-radius: 8px; box-sizing: border-box; font-family: 'Sarabun', sans-serif;
        }
        textarea { min-height: 120px; resize: vertical; }
        .btn-save { 
            width: 100%; padding: 16px; background: #2e7d32; 
            color: white; border: none; border-radius: 10px; 
            font-weight: bold; cursor: pointer; font-size: 1.2em; margin-top: 20px;
        }
        .btn-cancel { display: block; text-align: center; margin-top: 15px; color: #666; text-decoration: none; }
    </style>
</head>
<body>
    <div class="form-card">
        <h2><i class="fas fa-edit"></i> แก้ไขข้อมูลโครงงานวิจัย</h2>
        
        <form method="POST" enctype="multipart/form-data">
            {% csrf_token %}
            
            <div class="section-header">ข้อมูลพื้นฐาน</div>
            <div class="form-grid">
                <div class="form-group full-width">
                    <label>ชื่อโครงงาน (ไทย)</label>
                    <input type="text" name="title_th" value="{{ project.title_th }}" required>
                </div>
                <div class="form-group full-width">
                    <label>ชื่อโครงงาน (อังกฤษ)</label>
                    <input type="text" name="title_en" value="{{ project.title_en|default:'' }}">
                </div>
                <div class="form-group">
                    <label>ชื่อผู้จัดทำ/นักวิจัยหลัก</label>
                    <input type="text" name="student_name" value="{{ project.student_name }}" required>
                </div>
                <div class="form-group">
                    <label>ปีการศึกษา (พ.ศ.)</label>
                    <input type="number" name="academic_year" value="{{ project.academic_year }}" required>
                </div>
            </div>

            <div class="section-header">เนื้อหาทางวิชาการ & บทคัดย่อ</div>
            <div class="form-group">
                <label>บทคัดย่อ (Abstract)</label>
                <textarea name="abstract">{{ project.abstract }}</textarea>
            </div>
            <div class="form-group">
                <label>คำสำคัญ (Keywords)</label>
                <input type="text" name="keywords" value="{{ project.keywords }}">
            </div>
            
            <div class="form-grid">
                <div class="form-group">
                    <label>ความเป็นมาและเหตุผล</label>
                    <textarea name="background">{{ project.background }}</textarea>
                </div>
                <div class="form-group">
                    <label>วัตถุประสงค์</label>
                    <textarea name="objectives">{{ project.objectives }}</textarea>
                </div>
                <div class="form-group full-width">
                    <label>ขอบเขตการดำเนินงาน</label>
                    <textarea name="scope">{{ project.scope }}</textarea>
                </div>
            </div>

            <div class="section-header">ระเบียบวิธีวิจัยและผลการศึกษา</div>
            <div class="form-group">
                <label>ทฤษฎีที่เกี่ยวข้อง</label>
                <textarea name="theory">{{ project.theory }}</textarea>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>วิธีการวิจัย</label>
                    <textarea name="methodology">{{ project.methodology }}</textarea>
                </div>
                <div class="form-group">
                    <label>ผลการวิจัย</label>
                    <textarea name="results">{{ project.results }}</textarea>
                </div>
            </div>

            <div class="section-header">บทสรุปและข้อเสนอแนะ</div>
            <div class="form-group">
                <label>อภิปรายผล (Discussion)</label>
                <textarea name="discussion">{{ project.discussion }}</textarea>
            </div>
            <div class="form-grid">
                <div class="form-group">
                    <label>การนำไปใช้ประโยชน์</label>
                    <textarea name="suggestions_use">{{ project.suggestions_use }}</textarea>
                </div>
                <div class="form-group">
                    <label>ข้อเสนอแนะในอนาคต</label>
                    <textarea name="suggestions_next">{{ project.suggestions_next }}</textarea>
                </div>
            </div>

            <div class="section-header">ข้อมูลเพิ่มเติม & ไฟล์</div>
            <div class="form-group">
                <label>รางวัลที่ได้รับ</label>
                <input type="text" name="awards" value="{{ project.awards|default:'' }}">
            </div>
            <div class="form-group">
                <label>เปลี่ยนไฟล์ PDF (ปล่อยว่างถ้าไม่เปลี่ยน)</label>
                <input type="file" name="pdf_file" accept=".pdf">
                {% if project.pdf_file %}
                    <small style="color: blue;">ไฟล์ปัจจุบัน {{ project.pdf_file.name }}</small>
                {% endif %}
            </div>

            <button type="submit" class="btn-save"><i class="fas fa-save"></i> บันทึกการเปลี่ยนแปลง</button>
            <a href="{% url 'admin_dashboard' %}" class="btn-cancel">ยกเลิกและกลับ</a>
        </form>
    </div>
</body>
</html>
