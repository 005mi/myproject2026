<!-- =====================================================================
  TOAST NOTIFICATION — วางไว้ก่อนปิด </body> ในทุกหน้า
  top: 20px  (ใช้กับหน้าที่ไม่มี navbar เช่น login, register, upload)
  top: 70px  (ใช้กับหน้าที่มี topbar/navbar เช่น edit, admin_dashboard)
  ===================================================================== -->

<!-- ── 1. TOAST STYLES ──────────────────────────────────────────── -->
<style>
#toast-container {
    position: fixed;
    top: 20px;   /* ← เปลี่ยนเป็น 70px ถ้าหน้านั้นมี topbar */
    right: 20px;
    z-index: 99999;
    display: flex;
    flex-direction: column;
    gap: 10px;
    pointer-events: none;
}
.toast {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    min-width: 280px;
    max-width: 380px;
    padding: 13px 16px;
    background: white;
    border-radius: 12px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.12);
    pointer-events: all;
    animation: toastIn .35s cubic-bezier(0.34,1.56,0.64,1) both;
    position: relative;
    overflow: hidden;
}
.toast.success { border-left: 4px solid #2d6a4f; }
.toast.error   { border-left: 4px solid #c0392b; }
.toast.warning { border-left: 4px solid #c9972b; }
.toast.info    { border-left: 4px solid #2980b9; }

.toast-icon { font-size: 1em; margin-top: 2px; }
.toast.success .toast-icon { color: #2d6a4f; }
.toast.error   .toast-icon { color: #c0392b; }
.toast.warning .toast-icon { color: #c9972b; }
.toast.info    .toast-icon { color: #2980b9; }

.toast-msg { flex: 1; font-size: 0.9em; line-height: 1.4; }

.toast-progress {
    position: absolute; bottom: 0; left: 0; height: 3px;
    animation: toastProg 4s linear forwards;
}
.toast.success .toast-progress { background: #2d6a4f; }
.toast.error   .toast-progress { background: #c0392b; }
.toast.warning .toast-progress { background: #c9972b; }
.toast.info    .toast-progress { background: #2980b9; }

@keyframes toastIn {
    from { opacity:0; transform: translateX(60px) scale(.9); }
    to   { opacity:1; transform: translateX(0) scale(1); }
}
@keyframes toastProg { from { width:100%; } to { width:0%; } }
</style>

<!-- ── 2. CONTAINERS ── -->
<div id="toast-container"></div>

<div id="django-messages" style="display:none;">
    {% if messages %}
        {% for message in messages %}
            <span data-tags="{{ message.tags }}">{{ message }}</span>
        {% endfor %}
    {% endif %}
</div>

<!-- ── 3. SCRIPT ── -->
<script>
(function () {
    const TAG_MAP = {
        success: { cls:'success', icon:'fa-circle-check' },
        error:   { cls:'error',   icon:'fa-circle-xmark' },
        warning: { cls:'warning', icon:'fa-triangle-exclamation' },
        info:    { cls:'info',    icon:'fa-circle-info' },
        debug:   { cls:'info',    icon:'fa-circle-info' },
    };

    function showToast(msg, tag) {
        const cfg = TAG_MAP[tag] || TAG_MAP.info;
        const t = document.createElement('div');
        t.className = `toast ${cfg.cls}`;
        t.innerHTML = `<i class="fas ${cfg.icon} toast-icon"></i>
                       <span class="toast-msg">${msg}</span>
                       <div class="toast-progress"></div>`;
        document.getElementById('toast-container').appendChild(t);
        setTimeout(() => {
            t.style.transition = 'opacity .35s';
            t.style.opacity = '0';
            setTimeout(() => t.remove(), 350);
        }, 4000);
    }

    document.addEventListener('DOMContentLoaded', function () {
        document.querySelectorAll('#django-messages span').forEach((el, i) => {
            const tags = el.dataset.tags || 'info';
            const tag  = tags.split(' ').find(t => TAG_MAP[t]) || 'info';
            setTimeout(() => showToast(el.textContent.trim(), tag), i * 150);
        });
    });

    window.showToast = showToast;
})();
</script>
