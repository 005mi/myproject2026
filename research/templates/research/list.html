{% load static %}
<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>RTEC Academic Repository</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #222; }
        .container { max-width: 950px; margin: auto; position: relative; }
        
        .alert-messages {
            list-style: none;
            padding: 0;
            margin: 10px 0 20px 0;
            transition: all 0.5s ease;
        }
        .message-item {
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            font-weight: bold;  
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            animation: fadeInDown 0.5s ease forwards;
            margin-bottom: 10px;
        }
        .success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .info { background-color: #d1ecf1; color: #0c5460; border: 1px solid #bee5eb; }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-out { opacity: 0; transform: translateY(-20px); transition: 0.5s; }

        .user-nav { 
            position: absolute; 
            top: 0; 
            right: 0; 
            background: white;
            padding: 8px 18px;
            border-radius: 30px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            font-size: 0.9em;
            z-index: 10;
        }
        .user-nav b { color: #800000; }

        .btn-auth { 
            text-decoration: none; 
            padding: 6px 15px; 
            border-radius: 20px; 
            background: #800000; 
            color: white; 
            font-weight: bold;
        }

        .btn-logout { color: #d9534f; text-decoration: none; margin-left: 10px; font-weight: bold; }

        .header-section { text-align: center; margin-bottom: 30px; margin-top: 60px; }
        .logo-img { max-height: 110px; margin-bottom: 12px; }
        h1 { color: #800000; font-size: 1.9em; margin: 0; }
        h2 { color: #222; font-weight: 700; }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            border-bottom: 5px solid #800000;
        }
        .stat-value {
            font-size: 1.8em;
            font-weight: bold;
            color: #800000;
        }

        .add-project-container { text-align: center; margin-bottom: 30px; }
        .btn-add-project {
            display: inline-block;
            padding: 16px 40px; 
            background-color: #2e7d32; 
            color: white;
            border-radius: 50px; 
            font-weight: bold;
        }

        .search-container { background: white; padding: 35px; border-radius: 18px; margin-bottom: 35px; text-align: center; }

        .btn-search { 
            padding: 14px 35px; 
            background: #800000; 
            color: white; 
            border-radius: 30px; 
        }

        .filter-group { display: flex; justify-content: center; gap: 10px; }

        .btn-filter { 
            padding: 9px 20px; 
            background: white;
            border-radius: 20px; 
            border: 1px solid #e0e0e0; 
        }

        .btn-filter.active { 
            background: #800000; 
            color: white;
        }

        /* ⭐ การ์ด */
        .card { 
            background: white; 
            padding: 28px; 
            margin-bottom: 22px; 
            border-radius: 18px; 
            border-left: 12px solid #800000; 
            box-shadow: 0 6px 20px rgba(128,0,0,0.08);
        }

        /* ⭐ ปุ่ม PDF (แก้หลัก) */
        .btn-pdf { 
            display: inline-block; 
            padding: 11px 22px; 
            background-color: #800000; 
            color: white; 
            border-radius: 8px; 
            margin-top: 18px; 
            font-weight: bold;
        }

        .btn-pdf:hover { 
            background-color: #a00000;
        }
    </style>
</head>

<body>
<div class="container">

{% for p in projects %}
<div class="card">
    <span style="color: #800000; font-weight: bold;">{{ p.get_department_display }}</span>
    <h2>{{ p.title_th }}</h2>

    <!-- ⭐ แก้ตรงนี้ -->
    <p style="color:#444;">
        <b>ผู้จัดทำ:</b> {{ p.student_name }} | 
        <b>ปีการศึกษา:</b> {{ p.academic_year }}
    </p>

    {% if p.pdf_file %}
        <a href="{{ p.pdf_file.url }}" target="_blank" class="btn-pdf">เปิดอ่านไฟล์ PDF</a>
    {% endif %}
</div>
{% endfor %}

</div>
</body>
</html>
